services:
  - type: web
    name: startuphub-rag-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: startup-rag/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOWED_ORIGINS
        value: "https://ai-verse-dun.vercel.app,https://ai-verse-harish-0412s-projects.vercel.app,https://ai-verse-harish-0412-harish-0412s-projects.vercel.app"
    healthCheckPath: /health
    disk:
      name: chromadb-storage
      mountPath: /data
      sizeGB: 1
